<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GodoBurger - 2025</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Oswald:wght@500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/media.css') }}" />
    
    {% block css_adicional %}{% endblock %}
  </head>
  <body>
    <header class="header">
      <div class="header__container">
        {{session.nome}}
        <a href="/" class="header__logo">DevBurger</a>
        <nav class="header__nav">
          <ul class="header__menu">
            <li class="header__item"><a href="/" class="header__link">Home</a></li>
            <li class="header__item"><a href="#menu" class="header__link">Cardápio</a></li>
            <li class="header__item"><a href="#" class="header__link">Sobre</a></li>
            <li class="header__item"><a href="#" class="header__link">Contato</a></li>
          </ul>
        </nav>
        <div class="header__social">
          <a href="#" class="header__icon"><span class="material-symbols-outlined">thumb_up</span></a>
          <a href="#" class="header__icon"><span class="material-symbols-outlined">photo_camera</span></a>
        </div>
      </div>
    </header>

    {% block conteudo %} 
    {% endblock %}

     <!-- CARRINHO -->
    <div id="cart" class="cart">
      <div class="cart__header">
        <h2>Seu Carrinho</h2>
        <button id="close-cart">✖</button>
      </div>

      <div class="cart__items" id="cart-items"></div>

      <div class="cart__footer">
        <p>Total: R$ <span id="cart-total">0.00</span></p>
        <button class="button">Finalizar Compra</button>
      </div>
    </div>

    <footer class="footer">
      <p class="footer__text">DevBurger © 2025. Todos os direitos reservados.</p>
    </footer>

    <!-- JS -->
    <script>
      const cart = document.getElementById("cart");
      const openBtn = document.getElementById("cart-button");
      const closeBtn = document.getElementById("close-cart");

      let total = 0;

      openBtn.addEventListener("click", () => {
        cart.classList.add("active");
      });

      closeBtn.addEventListener("click", () => {
        cart.classList.remove("active");
      });

      function addToCart(nome, preco) {
        const cartItems = document.getElementById("cart-items");
        const cartTotal = document.getElementById("cart-total");

        const item = document.createElement("div");
        item.innerHTML = `<p>${nome} - R$ ${preco}</p>`;

        cartItems.appendChild(item);

        total += preco;
        cartTotal.innerText = total.toFixed(2);

        cart.classList.add("active");
      }
    </script>

  </body>
</html>
